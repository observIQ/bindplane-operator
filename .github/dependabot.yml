version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
    groups:
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
      golang-x:
        patterns:
          - "golang.org/x/*"
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/*"
      go-openapi:
        patterns:
          - "github.com/go-openapi/*"
      google:
        patterns:
          - "google.golang.org/*"
          - "cloud.google.com/*"
      prometheus:
        patterns:
          - "github.com/prometheus/*"
      uber:
        patterns:
          - "go.uber.org/*"
      cert-manager:
        patterns:
          - "github.com/cert-manager/*"

  - package-ecosystem: gomod
    directory: /tools
    schedule:
      interval: monthly
    groups:
      kubernetes:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
      golang-x:
        patterns:
          - "golang.org/x/*"
      opentelemetry:
        patterns:
          - "go.opentelemetry.io/*"
      go-openapi:
        patterns:
          - "github.com/go-openapi/*"
      google:
        patterns:
          - "google.golang.org/*"
          - "cloud.google.com/*"
      prometheus:
        patterns:
          - "github.com/prometheus/*"
      uber:
        patterns:
          - "go.uber.org/*"
      golangci:
        patterns:
          - "github.com/golangci/*"
      mvdan:
        patterns:
          - "mvdan.cc/*"
