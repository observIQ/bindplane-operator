name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  packages: write
  id-token: write  # Required for cosign keyless signing via Sigstore

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest-8-cores
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release
          version: v2.14.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign container images with cosign
        run: |
          TAG="${GITHUB_REF_NAME}"
          IMAGES=(
            "ghcr.io/observiq/bindplane-operator:${TAG}"
            "ghcr.io/observiq/bindplane-operator:latest"
          )
          for IMAGE in "${IMAGES[@]}"; do
            DIGEST=$(docker manifest inspect "${IMAGE}" -v | jq -r 'if type == "array" then .[0].Descriptor.digest else .Descriptor.digest end')
            if [ -n "${DIGEST}" ] && [ "${DIGEST}" != "null" ]; then
              cosign sign --yes "ghcr.io/observiq/bindplane-operator@${DIGEST}"
            fi
          done

      - name: Scan released image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/observiq/bindplane-operator:${{ github.ref_name }}
          format: sarif
          output: trivy-release-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-release-results.sarif
        if: always()
