name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  packages: write
  id-token: write  # Required for cosign keyless signing via Sigstore

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest-8-cores
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release
          version: v2.14.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign container images and attach SBOM attestations
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          IMAGES=(
            "ghcr.io/observiq/bindplane-operator:${TAG}"
            "ghcr.io/observiq/bindplane-operator:latest"
          )
          for IMAGE in "${IMAGES[@]}"; do
            DIGEST=$(docker manifest inspect "${IMAGE}" -v | jq -r 'if type == "array" then .[0].Descriptor.digest else .Descriptor.digest end')
            if [ -z "${DIGEST}" ] || [ "${DIGEST}" = "null" ]; then
              echo "ERROR: failed to resolve digest for ${IMAGE}"
              exit 1
            fi

            IMAGE_REF="ghcr.io/observiq/bindplane-operator@${DIGEST}"

            echo "Signing ${IMAGE_REF}"
            cosign sign --yes "${IMAGE_REF}"

            echo "Generating SBOM for ${IMAGE_REF}"
            syft "${IMAGE_REF}" -o spdx-json > sbom.spdx.json

            echo "Attaching SBOM attestation to ${IMAGE_REF}"
            cosign attest --yes --predicate sbom.spdx.json --type spdxjson "${IMAGE_REF}"

            rm -f sbom.spdx.json
          done
