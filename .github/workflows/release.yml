name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ensures tags/metadata are available

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates:
      # - Tags (e.g. ghcr.io/observiq/bindplane-operator:<tag>)
      # - OCI labels that point back to this repo + tag/sha
      - name: Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/observiq/bindplane-operator
          tags: |
            type=ref,event=tag
            # Optional: also tag "latest" when the tag looks like semver (v1.2.3 or 1.2.3)
            type=raw,value=latest,enable=${{ startsWith(github.ref_name, 'v') || contains(github.ref_name, '.') }}
          labels: |
            org.opencontainers.image.title=bindplane-operator
            org.opencontainers.image.description=BindPlane Operator
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Optional but nice: records build provenance/attestations in GHCR
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max