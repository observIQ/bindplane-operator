name: CI

on:
  merge_group:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run linter
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          go mod tidy
          make test

  test-e2e:
    name: Test E2E (${{ matrix.k8s-version || 'go.mod' }}, cert-manager=${{ matrix.cert-manager-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version:
          - ""       # go.mod / Kind default
          - "1.33.0"
          - "1.34.0"
          - "1.35.0"
        cert-manager-version:
          - "latest"
          - "v1.16.3"
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run e2e tests
        env:
          KIND_K8S_VERSION: ${{ matrix.k8s-version }}
          CERT_MANAGER_VERSION: ${{ matrix.cert-manager-version }}
        run: |
          go mod tidy
          make test-e2e

  gosec:
    name: Gosec
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run gosec security scanner
        run: make gosec

  license-check:
    name: License check
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check dependency licenses
        run: make license-check

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run Goreleaser build
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --snapshot --clean --skip=publish
          version: v2.14.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/observiq/bindplane-operator:latest-amd64
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

  generated:
    name: Generated files up to date
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run manifests and generate
        run: |
          make manifests
          make generate

      - name: Check generated files are up to date
        run: |
          git diff --exit-code || (
            echo "::error::Repository has uncommitted changes after 'make manifests generate'. Run 'make manifests generate' and commit the changes."
            exit 1
          )

  api-docs:
    name: API docs up to date
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate API docs
        run: make generate-api-docs

      - name: Check docs are up to date
        run: |
          git diff --exit-code docs/ || (
            echo "::error::docs/ has uncommitted changes after 'make generate-api-docs'. Run 'make generate-api-docs' and commit the changes."
            exit 1
          )

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run staticcheck
        run: make staticcheck

  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run govulncheck
        run: make govulncheck

  deadcode:
    name: Deadcode
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run deadcode
        run: make deadcode

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: shellcheck .github/workflows/scripts/*.sh
