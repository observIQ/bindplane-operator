name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run linter
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: |
          go mod tidy
          make test

  test-e2e:
    name: Test E2E (${{ matrix.k8s-version || 'go.mod' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        k8s-version:
          - ""       # go.mod / Kind default
          - "1.33.0"
          - "1.34.0"
          - "1.35.0"
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run e2e tests
        env:
          KIND_K8S_VERSION: ${{ matrix.k8s-version }}
        run: |
          go mod tidy
          make test-e2e

  gosec:
    name: Gosec
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run gosec security scanner
        run: make gosec

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Goreleaser build
        uses: goreleaser/goreleaser-action@v6
        with:
          args: build --snapshot --clean

  api-docs:
    name: API docs up to date
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate API docs
        run: make generate-api-docs

      - name: Check docs are up to date
        run: |
          git diff --exit-code docs/ || (
            echo "::error::docs/ has uncommitted changes after 'make generate-api-docs'. Run 'make generate-api-docs' and commit the changes."
            exit 1
          )
