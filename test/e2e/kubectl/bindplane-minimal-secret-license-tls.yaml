apiVersion: k8s.bindplane.com/v1alpha1
kind: Bindplane
metadata:
  name: bindplane
spec:
  config:
    licenseSecretRef:
      name: bindplane-license
      key: license
    store:
      postgres:
        host: postgres.postgres.svc
        port: "5432"
        database: postgres
        username: postgres
        password: password
        sslmode: verify-full
        tls:
          secretName: bindplane-postgres-tls
          caKey: ca.crt
          certKey: tls.crt
          keyKey: tls.key
    tsdb:
      tls:
        certManager:
          name: bindplane-internal-issuer
          kind: Issuer
          group: cert-manager.io
    nats:
      tls:
        certManager:
          name: bindplane-internal-issuer
          kind: Issuer
          group: cert-manager.io
  nats:
    replicas: 1
  tsdb:
    tls:
      certManager:
        name: bindplane-internal-issuer
        kind: Issuer
        group: cert-manager.io
