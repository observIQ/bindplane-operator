apiVersion: v1
kind: Namespace
metadata:
  name: openldap
---
apiVersion: v1
data:
  ca.crt: 
  ldap.crt: 
  ldap.key: 
kind: Secret
metadata:
  name: openldap-tls
  namespace: openldap
type: Opaque
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: openldap
  name: openldap
  namespace: openldap
spec:
  ports:
  - name: ldap
    port: 1389
    protocol: TCP
    targetPort: 1389
  - name: ldap-tls
    port: 1636
    protocol: TCP
    targetPort: 1636
  selector:
    app: openldap
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: openldap
  name: openldap
  namespace: openldap
spec:
  selector:
    matchLabels:
      app: openldap
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: openldap
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - openldap
              topologyKey: kubernetes.io/hostname
            weight: 100
      containers:
      - env:
        - name: LDAP_ROOT
          value: dc=stage,dc=net
        - name: LDAP_ADMIN_USERNAME
          value: admin
        - name: LDAP_ADMIN_PASSWORD
          value: stageadmin
        - name: LDAP_USERS
          value: stage,pruser
        - name: LDAP_PASSWORDS
          value: stagepassword,prpassword
        - name: LDAP_TLS_CERT_FILE
          value: /ldap.crt
        - name: LDAP_TLS_KEY_FILE
          value: /ldap.key
        - name: LDAP_TLS_CA_FILE
          value: /ca.crt
        - name: LDAP_ENABLE_TLS
          value: "yes"
        image: bmedora/openldap:2.6.3
        livenessProbe:
          initialDelaySeconds: 5
          tcpSocket:
            port: 1389
        name: openldap
        ports:
        - containerPort: 1389
          name: ldap
        - containerPort: 1636
          name: ldap-tls
        readinessProbe:
          initialDelaySeconds: 5
          tcpSocket:
            port: 1389
        resources:
          limits:
            memory: 100Mi
          requests:
            cpu: 250m
            memory: 100Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - all
        volumeMounts:
        - mountPath: /ca.crt
          name: openldap-tls
          subPath: ca.crt
        - mountPath: /ldap.crt
          name: openldap-tls
          subPath: ldap.crt
        - mountPath: /ldap.key
          name: openldap-tls
          subPath: ldap.key
      terminationGracePeriodSeconds: 30
      volumes:
      - name: openldap-tls
        secret:
          secretName: openldap-tls
