apiVersion: k8s.bindplane.com/v1alpha1
kind: Bindplane
metadata:
  labels:
    app.kubernetes.io/name: bindplane-operator
    app.kubernetes.io/managed-by: kustomize
  name: bindplane-sample
spec:
  bindplane:
    config:
      license: "your-license-key-here"
      mode:
        - all
      auth:
        type: system
        username: admin
        password: password
      network:
        host: 0.0.0.0
        port: "3001"
        remoteURL: http://bindplane:3001
      store:
        type: postgres
        postgres:
          host: postgres.example.com
          port: "5432"
          database: bindplane
          username: bindplane
          password: bindplane
      eventBus:
        type: local
