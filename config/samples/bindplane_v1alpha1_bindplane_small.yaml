apiVersion: k8s.bindplane.com/v1alpha1
kind: Bindplane
metadata:
  labels:
    app.kubernetes.io/name: bindplane-operator
    app.kubernetes.io/managed-by: kustomize
  name: bindplane-sample
spec:
  config:
    license: "your-license-key-here"
    auth:
      type: system
      username: admin
      password: password
    network:
      host: 0.0.0.0
      port: "3001"
      remoteURL: http://bindplane:3001
    store:
      type: postgres
      postgres:
        host: postgres.example.com
        port: "5432"
        database: bindplane
        username: bindplane
        password: bindplane
  bindplane:
    # Configure Bindplane Node for small deployments (2 replicas, reduced resources)
    replicas: 2
    podTemplate:
      spec:
        containers:
          - name: server
            resources:
              requests:
                cpu: 500m
                memory: 1024Mi
              limits:
                memory: 1024Mi
  bindplaneJobs:
    # Configure Bindplane Jobs for small deployments
    podTemplate:
      spec:
        containers:
          - name: server
            resources:
              requests:
                cpu: 100m
                memory: 1024Mi
              limits:
                memory: 1024Mi
  bindplaneJobsMigrate:
    # Configure Bindplane Jobs Migrate for small deployments
    podTemplate:
      spec:
        containers:
          - name: server
            resources:
              requests:
                cpu: 100m
                memory: 1024Mi
              limits:
                memory: 1024Mi
  transformAgent:
    # Configure Transform Agent for small deployments (1 replica, reduced resources)
    replicas: 1
    podTemplate:
      spec:
        containers:
          - name: transform-agent
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 512Mi
  nats:
    # Configure NATS for small deployments (1 replica, reduced resources)
    # Note: With 1 replica, cluster routes will automatically include only the first hostname
    replicas: 1
    podTemplate:
      spec:
        containers:
          - name: server
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 256Mi
  tsdb:
    # Configure Bindplane's TSDB (Prometheus by default) for small deployments
    podTemplate:
      spec:
        containers:
          - name: tsdb
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 256Mi
