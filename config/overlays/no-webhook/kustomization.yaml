# No-webhook install path: deploys the operator without the validating admission webhook.
# cert-manager is NOT required. The manager starts with --enable-validating-webhook=false.
namespace: bindplane-operator-system

namePrefix: bindplane-operator-

resources:
- ../../crd
- ../../rbac
- ../../manager
- metrics_service.yaml

patches:
- path: manager_metrics_patch.yaml
  target:
    kind: Deployment
- path: disable_webhook_patch.yaml
  target:
    kind: Deployment
